[package]
name = "rmux-render-core"
version = "0.8.0-kopitiam.1"
edition = "2021"
publish = false
license = "AGPL-3.0-only"
repository = "https://github.com/theodoreOnzGit/kopitiam"
description = "Pure-data RMUX pane snapshot and ratatui rendering core for browser and native hosts."
keywords = ["terminal", "multiplexer", "rendering"]
categories = ["command-line-interface", "wasm"]

[dependencies]
ratatui-core = { package = "ratatui", version = "=0.29.0", default-features = false }
serde = { version = "1.0", features = ["derive"] }
