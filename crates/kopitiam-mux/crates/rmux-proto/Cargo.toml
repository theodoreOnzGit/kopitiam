[package]
name = "rmux-proto"
version = "0.8.0-kopitiam.1"
edition = "2021"
license = "AGPL-3.0-only"
repository = "https://github.com/theodoreOnzGit/kopitiam"
description = "RMUX detached IPC protocol DTOs, framing, and wire-safe error types."
keywords = ["terminal", "multiplexer", "protocol"]
categories = ["command-line-interface", "asynchronous"]
publish = false

[dependencies]
bincode = "1.3.3"
rmux-types = { path = "../rmux-types", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0"

[dev-dependencies]
serde_json = "1"
