[package]
name = "rmux-server"
version = "0.8.0-kopitiam.1"
edition = "2021"
publish = false
license = "AGPL-3.0-only"
repository = "https://github.com/theodoreOnzGit/kopitiam"
description = "Tokio daemon and request dispatcher for the RMUX terminal multiplexer."
keywords = ["terminal", "multiplexer", "daemon"]
categories = ["command-line-interface"]

[dependencies]
async-recursion = "=1.1.1"
base64 = { version = "0.22", optional = true }
chrono = { version = "0.4.42", default-features = false, features = ["clock", "std"] }
getrandom = { version = "0.3", optional = true }
glob = "0.3"
hkdf = { version = "0.12", optional = true }
httparse = { version = "1.9", optional = true }
regex = "1.12.2"
rmux-core = { path = "../rmux-core" }
rmux-ipc = { path = "../rmux-ipc" }
rmux-os = { path = "../rmux-os" }
rmux-proto = { path = "../rmux-proto" }
rmux-pty = { path = "../rmux-pty" }
rmux-web-crypto = { path = "../rmux-web-crypto", optional = true }
zeroize = { version = "1", default-features = false, optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
sha1 = { version = "0.10", optional = true }
sha2 = { version = "0.10", optional = true }
subtle = { version = "2.6", optional = true }
tokio = { version = "1.48.0", features = ["io-util", "macros", "net", "process", "rt", "sync", "time"] }
toml = { version = "0.8", optional = true }
tracing = "0.1"

[features]
default = ["web"]
perf-instrument = []
web = [
    "dep:base64",
    "dep:getrandom",
    "dep:hkdf",
    "dep:httparse",
    "dep:rmux-web-crypto",
    "dep:serde",
    "dep:serde_json",
    "dep:sha1",
    "dep:sha2",
    "dep:subtle",
    "dep:toml",
    "dep:zeroize",
]
fuzzing = []

[target.'cfg(unix)'.dependencies]
rustix = { version = "1.1.4", features = ["event", "fs", "net", "process"] }

[dev-dependencies]
rustix = { version = "1.1.4", features = ["event", "fs", "termios"] }
static_assertions = "1.1"
