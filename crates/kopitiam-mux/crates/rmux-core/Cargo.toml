[package]
name = "rmux-core"
version = "0.8.0-kopitiam.1"
edition = "2021"
publish = false
license = "AGPL-3.0-only"
repository = "https://github.com/theodoreOnzGit/kopitiam"
description = "Core session, pane, layout, format, hook, and buffer model for the RMUX terminal multiplexer."
keywords = ["terminal", "multiplexer", "core"]
categories = ["command-line-interface"]

[dependencies]
chrono = { version = "0.4.42", default-features = false, features = ["clock", "std"] }
compact_str = "0.8.1"
regex = "1.12.2"
rmux-proto = { path = "../rmux-proto" }
unicode-width = "0.1"
