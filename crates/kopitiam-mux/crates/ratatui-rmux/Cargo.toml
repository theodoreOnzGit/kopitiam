[package]
name = "ratatui-rmux"
version = "0.8.0-kopitiam.1"
edition = "2021"
license = "AGPL-3.0-only"
repository = "https://github.com/theodoreOnzGit/kopitiam"
description = "Ratatui integration crate for the RMUX terminal multiplexer that paints daemon-backed pane state into a ratatui Buffer."
keywords = ["terminal", "multiplexer", "ratatui"]
categories = ["command-line-interface"]
publish = false

# Direct dependencies are intentionally minimal: `rmux-sdk` is the only
# RMUX integration boundary, and one ratatui surface is linked under the
# `ratatui-core` crate name for source compatibility.
[dependencies]
ratatui-core = { package = "ratatui", version = "=0.29.0", default-features = false }
rmux-sdk = { path = "../rmux-sdk" }

[dev-dependencies]
tokio = { version = "1.48.0", features = ["macros", "rt", "time"] }
