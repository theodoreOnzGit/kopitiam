[package]
name = "rmux-client"
version = "0.8.0-kopitiam.1"
edition = "2021"
publish = false
license = "AGPL-3.0-only"
repository = "https://github.com/theodoreOnzGit/kopitiam"
description = "Blocking local client and attach-mode plumbing for the RMUX terminal multiplexer."
keywords = ["terminal", "multiplexer", "client"]
categories = ["command-line-interface"]

[dependencies]
rmux-core = { path = "../rmux-core" }
rmux-ipc = { path = "../rmux-ipc" }
rmux-os = { path = "../rmux-os" }
rmux-proto = { path = "../rmux-proto" }
tracing = "0.1"

[target.'cfg(unix)'.dependencies]
libc = "0.2.185"
rmux-sdk = { path = "../rmux-sdk" }
rustix = { version = "1.1.4", features = ["event", "net", "process", "runtime", "termios", "thread"] }
signal-hook = "0.3.18"
tokio = { version = "1.48.0", features = ["net", "rt", "time"] }

[target.'cfg(windows)'.dependencies]
rmux-sdk = { path = "../rmux-sdk" }
tokio = { version = "1.48.0", features = ["io-util", "macros", "rt", "sync", "time"] }
windows-sys = { version = "0.61.2", features = ["Win32_Foundation", "Win32_Storage_FileSystem", "Win32_System_Console", "Win32_System_Pipes", "Win32_System_Threading", "Win32_UI_Input_KeyboardAndMouse"] }

[dev-dependencies]
rmux-pty = { path = "../rmux-pty" }
rmux-server = { path = "../rmux-server" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "time"] }
